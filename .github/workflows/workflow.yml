name: ELK Deploy

on:
  push:
    branches:
      - development
      - staging
      - master

jobs:
  Deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ">=1.6 <2.0"

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan \
            -var="alicloud_access_key=${{ secrets.ALICLOUD_ACCESS_KEY }}" \
            -var="alicloud_secret_key=${{ secrets.ALICLOUD_SECRET_KEY }}"
          exitcode=$?
          echo "exitcode=$exitcode" >> $GITHUB_OUTPUT
          exit 0

      - name: Fail if Plan Failed
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - name: Terraform Apply
        if: steps.plan.outputs.exitcode == '2'
        working-directory: terraform
        run: terraform apply -auto-approve tfplan

      - name: Install Ansible
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ansible

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add server to known_hosts
        run: |
          ssh-keyscan -H 8.213.49.97 >> ~/.ssh/known_hosts

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i inventory.ini Ansible/monitoring-server.yml