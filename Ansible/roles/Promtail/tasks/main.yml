- name: Deploy Promtail
  become: true
  block:

    - name: Create Promtail config directory
      ansible.builtin.file:
        path: /opt/promtail
        state: directory
        mode: "0755"

    - name: Write Promtail config
      ansible.builtin.copy:
        dest: /opt/promtail/promtail-config.yml
        mode: "0644"
        content: |
          server:
            http_listen_port: 9080
            grpc_listen_port: 0

          positions:
            filename: /tmp/positions.yaml

          clients:
            - url: http://loki:3100/loki/api/v1/push

          scrape_configs:
            - job_name: system
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: varlogs
                    host: monitoring-server
                    __path__: /var/log/*.log

            - job_name: docker
              static_configs:
                - targets:
                    - localhost
                  labels:
                    job: docker
                    host: monitoring-server
                    __path__: /var/lib/docker/containers/*/*-json.log
              pipeline_stages:
                - json:
                    expressions:
                      log: log
                      stream: stream
                      time: time
                - labels:
                    stream:
                - output:
                    source: log

    - name: Run Promtail container
      community.docker.docker_container:
        name: promtail
        image: grafana/promtail:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "9080:9080"
        networks:
          - name: monitoring
        volumes:
          - /opt/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
          - /var/log:/var/log:ro
          - /var/lib/docker/containers:/var/lib/docker/containers:ro
        command: -config.file=/etc/promtail/promtail-config.yml
