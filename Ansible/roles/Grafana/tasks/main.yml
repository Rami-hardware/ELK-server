- name: Deploy Grafana
  become: true
  block:

    - name: Create Grafana data directory
      ansible.builtin.file:
        path: /opt/grafana
        state: directory
        mode: "0755"

    - name: Run Grafana container
      community.docker.docker_container:
        name: grafana
        image: grafana/grafana:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "3000:3000"
        volumes:
          - grafana_data:/var/lib/grafana
        env:
          GF_SECURITY_ADMIN_USER: admin
          GF_SECURITY_ADMIN_PASSWORD: admin
          GF_USERS_ALLOW_SIGN_UP: "false"

    - name: Install CloudMonitor plugin
      community.docker.docker_container_exec:
        container: grafana
        command: grafana-cli plugins install aliyun-cms-grafana

    - name: Restart Grafana to load plugin
      community.docker.docker_container:
        name: grafana
        state: started
        restart: true

    - name: Verify CloudMonitor plugin installed
      community.docker.docker_container_exec:
        container: grafana
        command: grafana-cli plugins ls
      register: grafana_plugins

    - name: Show installed plugins
      ansible.builtin.debug:
        msg: "{{ grafana_plugins.stdout_lines | select('search', 'aliyun') | list }}"
