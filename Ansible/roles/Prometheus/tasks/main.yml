- name: Deploy Prometheus
  become: true
  block:

    - name: Create Prometheus config directory
      ansible.builtin.file:
        path: /opt/prometheus
        state: directory
        mode: "0755"

    - name: Write Prometheus config
      ansible.builtin.copy:
        dest: /opt/prometheus/prometheus.yml
        mode: "0644"
        content: |
          global:
            scrape_interval: 15s
            evaluation_interval: 15s

          scrape_configs:
            - job_name: "prometheus"
              static_configs:
                - targets: ["localhost:9090"]

            - job_name: "linux-ecs"
              static_configs:
                - targets:
                    - "10.50.6.215:9100"
                    - "10.50.6.213:9100"
                    - "10.50.6.211:9100"
                    - "10.50.2.127:9100"
                    - "10.50.6.219:9100"
                  labels:
                    os: "linux"
              relabel_configs:
                - source_labels: [__address__]
                  regex: "10.50.6.215:.*"
                  target_label: instance
                  replacement: "nextcloud-ecs-office"
                - source_labels: [__address__]
                  regex: "10.50.6.213:.*"
                  target_label: instance
                  replacement: "nextcloud-ecs"
                - source_labels: [__address__]
                  regex: "10.50.6.211:.*"
                  target_label: instance
                  replacement: "cognna-ecs"
                - source_labels: [__address__]
                  regex: "10.50.6.219:.*"
                  target_label: instance
                  replacement: "monitoring-server"
                - source_labels: [__address__]
                  regex: "10.50.2.127:.*"
                  target_label: instance
                  replacement: "FAC-Cloud-Share"

            - job_name: "windows-ecs"
              static_configs:
                - targets: ["10.50.1.85:9182"]
                  labels:
                    instance: "Hudoor-ecs"
                - targets: ["10.50.1.76:9182"]
                  labels:
                    instance: "Tasheel-Web"
                - targets: ["10.50.6.206:9182"]
                  labels:
                    instance: "AD-01"
                - targets: ["10.50.1.77:9182"]
                  labels:
                    instance: "ArcMate-Application"

    - name: Run Prometheus container
      community.docker.docker_container:
        name: prometheus
        image: prom/prometheus:latest
        state: started
        restart_policy: unless-stopped
        ports:
          - "9090:9090"
        volumes:
          - /opt/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
          - prometheus_data:/prometheus
        command:
          - "--config.file=/etc/prometheus/prometheus.yml"
          - "--storage.tsdb.path=/prometheus"
          - "--web.console.libraries=/usr/share/prometheus/console_libraries"
          - "--web.console.templates=/usr/share/prometheus/consoles"
